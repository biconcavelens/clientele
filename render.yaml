services:
  - type: web
    name: clientele-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MOCK_MODE
        value: "false"
      - key: COGNEE_API_KEY
        sync: false
      - key: COGNEE_BASE_URL
        sync: false
